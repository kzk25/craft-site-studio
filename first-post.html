<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Noto Sans JP', sans-serif;
    background: #0f1e30;
  }
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap');

  .card {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(145deg, #1e3a5f 0%, #0f1e30 60%, #1a2e4a 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* 背景の装飾 */
  .card::before {
    content: '';
    position: absolute;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(234,108,30,.18) 0%, transparent 70%);
    border-radius: 50%;
  }
  .card::after {
    content: '';
    position: absolute;
    bottom: -200px; left: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(37,99,235,.15) 0%, transparent 70%);
    border-radius: 50%;
  }

  .grid-line {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  .inner {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 80px;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(234,108,30,.15);
    border: 1px solid rgba(234,108,30,.4);
    color: #ea6c1e;
    font-family: 'DM Sans', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: .15em;
    text-transform: uppercase;
    padding: 10px 28px;
    border-radius: 100px;
    margin-bottom: 48px;
  }

  .hi {
    font-size: 36px;
    font-weight: 300;
    color: rgba(255,255,255,.7);
    letter-spacing: .1em;
    margin-bottom: 16px;
  }

  .name {
    font-size: 72px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -.01em;
    line-height: 1.1;
    margin-bottom: 48px;
  }
  .name span {
    color: #ea6c1e;
  }

  .divider {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, #ea6c1e, #2563eb);
    border-radius: 100px;
    margin-bottom: 48px;
  }

  .desc {
    font-size: 28px;
    font-weight: 400;
    color: rgba(255,255,255,.85);
    line-height: 1.7;
    margin-bottom: 64px;
    letter-spacing: .04em;
  }

  .badges {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 72px;
  }
  .badge {
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.15);
    color: rgba(255,255,255,.9);
    font-size: 20px;
    font-weight: 500;
    padding: 12px 28px;
    border-radius: 100px;
    letter-spacing: .03em;
  }

  .footer-line {
    display: flex;
    align-items: center;
    gap: 20px;
    color: rgba(255,255,255,.45);
    font-family: 'DM Sans', sans-serif;
    font-size: 20px;
    font-weight: 500;
    letter-spacing: .08em;
  }
  .footer-line .dot {
    width: 6px; height: 6px;
    background: #ea6c1e;
    border-radius: 50%;
  }

  /* 角の装飾 */
  .corner {
    position: absolute;
    width: 80px; height: 80px;
    z-index: 2;
  }
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: rgba(234,108,30,.5);
  }
  .corner::before { width: 2px; height: 40px; }
  .corner::after  { width: 40px; height: 2px; }
  .corner.tl { top: 48px; left: 48px; }
  .corner.tl::before { top:0; left:0; }
  .corner.tl::after  { top:0; left:0; }
  .corner.tr { top: 48px; right: 48px; }
  .corner.tr::before { top:0; right:0; }
  .corner.tr::after  { top:0; right:0; }
  .corner.bl { bottom: 48px; left: 48px; }
  .corner.bl::before { bottom:0; left:0; }
  .corner.bl::after  { bottom:0; left:0; }
  .corner.br { bottom: 48px; right: 48px; }
  .corner.br::before { bottom:0; right:0; }
  .corner.br::after  { bottom:0; right:0; }
</style>
</head>
<body>
<div class="card">
  <div class="grid-line"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="inner">
    <div class="tag">First Post</div>
    <div class="hi">はじめまして</div>
    <div class="name">craft_<span>site</span>_studio</div>
    <div class="divider"></div>
    <div class="desc">
      CS卒エンジニアによるWeb制作<br>
      業種・地域を問わず、全国対応
    </div>
    <div class="badges">
      <div class="badge">コーポレートサイト</div>
      <div class="badge">LP</div>
      <div class="badge">ポートフォリオ</div>
      <div class="badge">無料デモ制作あり</div>
    </div>
    <div class="footer-line">
      <span>@craft_site_studio</span>
      <div class="dot"></div>
      <span>craft-site-studio.pages.dev</span>
    </div>
  </div>
</div>
</body>
</html>
