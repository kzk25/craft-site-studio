name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 6ca36562e5a2128c9dc46a4d1c5048aa
          command: pages deploy . --project-name=craft-site-studio --branch=${{ github.ref_name }}
